  /api/v1/admin/categories:
    get:
      summary: ''
      operationId: getApiV1AdminCategories
      description: ''
      parameters: []
      responses:
        401:
          description: ''
          content:
            application/json:
              schema:
                type: object
                example:
                  success: false
                  code: UNAUTHENTICATED
                  message: 'Bạn chưa đăng nhập.'
                  errors: {  }
                properties:
                  success:
                    type: boolean
                    example: false
                  code:
                    type: string
                    example: UNAUTHENTICATED
                  message:
                    type: string
                    example: 'Bạn chưa đăng nhập.'
                  errors:
                    type: object
                    properties: {  }
      tags:
        - 'Admin > Danh mục'
    post:
      summary: ''
      operationId: postApiV1AdminCategories
      description: ''
      parameters: []
      responses: {  }
      tags:
        - 'Admin > Danh mục'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: 'value không được vượt quá 255 ký tự.'
                  example: b
                slug:
                  type: string
                  description: 'Must match the regex /^[a-z0-9]+(?:-[a-z0-9]+)*$/. value không được vượt quá 255 ký tự.'
                  example: 'n'
                parent_id:
                  type: integer
                  description: 'The <code>id</code> of an existing record in the categories table.'
                  example: 16
                  nullable: true
                description:
                  type: string
                  description: 'value không được vượt quá 1000 ký tự.'
                  example: 'Et animi quos velit et fugiat.'
                  nullable: true
                sort_order:
                  type: integer
                  description: 'value phải tối thiểu 0.'
                  example: 42
                is_active:
                  type: boolean
                  description: ''
                  example: false
              required:
                - name
                - slug
