openapi: 3.0.3
info:
  title: 'Ban Chim Bồ Câu — API Documentation'
  description: 'Backend API cho hệ thống bán gia cầm & thú nuôi. Hỗ trợ quản lý sản phẩm, tồn kho, đơn hàng.'
  version: 1.0.0
servers:
  -
    url: 'http://127.0.0.1:8000'
tags:
  -
    name: 'Admin > Danh mục'
    description: "\nQuản lý danh mục sản phẩm (max 2 cấp)"
  -
    name: 'Admin > Sản phẩm'
    description: "\nCRUD sản phẩm và toggle trạng thái active"
  -
    name: 'Admin > Tồn kho'
    description: "\nĐiều chỉnh tồn kho và xem lịch sử thay đổi"
  -
    name: 'Admin > Ảnh sản phẩm'
    description: "\nUpload, đặt ảnh chính, xóa ảnh sản phẩm (lưu trên S3)"
  -
    name: Auth
    description: "\nXác thực admin (Sanctum token)"
  -
    name: 'Public > Sản phẩm'
    description: "\nXem danh sách và chi tiết sản phẩm (không cần đăng nhập)"
components:
  securitySchemes:
    default:
      type: http
      scheme: bearer
      description: 'Gửi `POST /api/v1/admin/login` với `email` và `password` để nhận token. Thêm header `Authorization: Bearer {token}` cho các admin endpoint. Public endpoint không cần token.'
security:
  -
    default: []
